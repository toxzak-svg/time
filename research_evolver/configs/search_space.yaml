# Genome search space for v1 (mutator + repair use this)

# Locked in v1
task_family: [small_model_reasoning]
base_model: [Qwen/Qwen2.5-1.5B-Instruct]

# Data — main method-level variation
synthetic_data_ratio: { min: 0.0, max: 1.0, type: float }
prompt_template_id: [default, chain_of_thought, few_shot]
filter_strategy: [none, critique, difficulty]
critique_enabled: [true, false]
critique_threshold: { min: 0.5, max: 0.95, type: float }
curriculum_strategy: [uniform, progressive_hardness, curriculum_by_loss]

# Adapter / training
adapter_rank: [4, 8, 16, 32]
adapter_alpha: [8, 16, 32, 64]
adapter_dropout: { min: 0.0, max: 0.15, type: float }
target_modules: ["q_proj,v_proj,k_proj,o_proj", "q_proj,v_proj"]
learning_rate: { min: 1e-5, max: 5e-5, type: float, log: true }
batch_size: [4, 8, 16]
grad_accum: [1, 2, 4]
train_steps: [100, 200, 400, 800, 1200]
warmup_ratio: { min: 0.03, max: 0.15, type: float }
weight_decay: { min: 0.0, max: 0.1, type: float }

# Decoding
temperature: { min: 0.1, max: 0.9, type: float }
top_p: { min: 0.8, max: 1.0, type: float }
max_new_tokens: [256, 512, 1024]

# Control (stage-specific overrides in runners)
proxy_eval_size: 200
confirmation_eval_size: 500
seed: [42, 43, 44]
